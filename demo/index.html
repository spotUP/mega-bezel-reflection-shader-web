<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>mega-bezel-wasm demo</title>
  <style>
    body { font-family: monospace; background: #1a1a2e; color: #e0e0e0; padding: 2rem; }
    #status { padding: 1rem; background: #16213e; border-radius: 4px; margin-top: 1rem; white-space: pre-wrap; }
    .ok { color: #0f0; }
    .err { color: #f44; }
    .info { color: #4af; }
  </style>
</head>
<body>
  <h1>mega-bezel-wasm</h1>
  <div id="status">Loading WASM module...</div>
  <script src="../dist/wasm/mega-bezel.js"></script>
  <script>
    const POTATO_PRESET = `shaders = 10

shader0 = ../../../shaders/guest/extras/hsm-drez-none.slang
filter_linear0 = false
srgb_framebuffer0 = true
scale_type0 = source
scale_x0 = 1
scale_y0 = 1
alias0 = "DerezedPass"

shader1 = ../../../shaders/base/cache-info-potato-params.slang
filter_linear1 = false
scale_type1 = source
scale1 = 1.0
alias1 = "InfoCachePass"

shader2 = ../../../shaders/guest/extras/hsm-fetch-drez-output.slang
filter_linear2 = false
srgb_framebuffer2 = true
scale_type2 = source
scale_x2 = 1
scale_y2 = 1

shader3 = ../../../shaders/dogway/hsm-grade.slang
filter_linear3 = false
scale_type3 = source
scale3 = 1.0
alias3 = "ColorCorrectPass"

shader4 = ../../../shaders/base/stock.slang
filter_linear4 = true
scale_type4 = source
scale_x4 = 1.0
scale_y4 = 1.0
alias4 = "PrePass"
mipmap_input4 = true

shader5 = ../../../shaders/guest/hsm-avg-lum.slang
filter_linear5 = true
scale_type5 = source
scale5 = 1.0
mipmap_input5 = true
alias5 = "AvgLumPass"

shader6 = ../../../shaders/guest/hsm-interlace-and-linearize.slang
filter_linear6 = true
scale_type6 = source
scale6 = 1.0
float_framebuffer6 = true
alias6 = "LinearizePass"

shader7 = ../../../shaders/base/delinearize.slang
scale_type7 = source
float_framebuffer7 = "true"

shader8 = ../../../shaders/guest/hsm-crt-dariusg-gdv-mini-potato.slang
scale_type8 = viewport
scale_x8 = 1.0
scale_y8 = 1.0
filter_linear8 = true
float_framebuffer8 = "true"
alias8 = "CRTPass"

g_sat = 0.25
g_lum = 0.15
g_gamma_out = 2.45

shader9 = ../../../shaders/base/post-crt-prep-potato.slang
mipmap_input9 = true
scale_type9 = viewport
float_framebuffer9 = true
alias9 = "PostCRTPass"

textures = "SamplerLUT1;SamplerLUT2;SamplerLUT3;SamplerLUT4;ScreenPlacementImage;BackgroundImage;BackgroundVertImage"

SamplerLUT1 = ../../../shaders/guest/lut/trinitron-lut.png
SamplerLUT1_linear = true
SamplerLUT2 = ../../../shaders/guest/lut/inv-trinitron-lut.png
SamplerLUT2_linear = true
SamplerLUT3 = ../../../shaders/guest/lut/nec-lut.png
SamplerLUT3_linear = true
SamplerLUT4 = ../../../shaders/guest/lut/ntsc-lut.png
SamplerLUT4_linear = true

ScreenPlacementImage = ../../../shaders/textures/Placeholder_Transparent_16x16.png
ScreenPlacementImage_linear = false

BackgroundImage = ../../../shaders/textures/Baked_Frame_Carbonfiber_Background.png
BackgroundImage_linear = true
BackgroundImage_mipmap = 1

BackgroundVertImage = ../../../shaders/textures/Baked_Frame_Carbonfiber_Background_Vert.png
BackgroundVertImage_linear = true
BackgroundVertImage_mipmap = 1

HSM_ASPECT_RATIO_MODE = 1
`;

    (async function () {
      const el = document.getElementById('status');
      const log = (cls, msg) => { el.innerHTML += `<span class="${cls}">${msg}</span>\n`; };
      el.innerHTML = '';

      try {
        const Module = await MegaBezelModule();
        const mbz_init = Module.cwrap('mbz_init', 'number', []);
        const mbz_version = Module.cwrap('mbz_version', 'number', []);
        const mbz_load_preset = Module.cwrap('mbz_load_preset', 'number', ['string']);
        const mbz_get_pass_count = Module.cwrap('mbz_get_pass_count', 'number', []);
        const mbz_get_lut_count = Module.cwrap('mbz_get_lut_count', 'number', []);
        const mbz_get_parameter_count = Module.cwrap('mbz_get_parameter_count', 'number', []);
        const mbz_get_pass_source_path = Module.cwrap('mbz_get_pass_source_path', 'string', ['number']);
        const mbz_get_lut_id = Module.cwrap('mbz_get_lut_id', 'string', ['number']);
        const mbz_get_lut_path = Module.cwrap('mbz_get_lut_path', 'string', ['number']);
        const mbz_get_parameter_id = Module.cwrap('mbz_get_parameter_id', 'string', ['number']);
        const mbz_get_parameter_value = Module.cwrap('mbz_get_parameter_value', 'number', ['number']);
        const mbz_get_feedback_pass = Module.cwrap('mbz_get_feedback_pass', 'number', []);

        const initResult = mbz_init();
        log('ok', `[OK] mbz_init() = ${initResult}`);
        log('ok', `[OK] mbz_version() = ${mbz_version()}`);

        const FS = Module.FS || Module['FS'];
        FS.writeFile('/test.slangp', POTATO_PRESET);
        log('info', '[INFO] Wrote test preset to MEMFS /test.slangp');

        const loadResult = mbz_load_preset('/test.slangp');
        if (loadResult) {
          log('ok', `[OK] mbz_load_preset() = ${loadResult}`);
        } else {
          log('err', `[ERROR] mbz_load_preset() = ${loadResult}`);
        }

        const passes = mbz_get_pass_count();
        const luts = mbz_get_lut_count();
        const params = mbz_get_parameter_count();
        const feedback = mbz_get_feedback_pass();

        log('info', `\n--- Parsed Preset ---`);
        log('info', `Passes: ${passes}`);
        log('info', `LUTs: ${luts}`);
        log('info', `Parameters: ${params}`);
        log('info', `Feedback pass: ${feedback}`);

        if (passes > 0) {
          log('info', `\n--- Pass Source Paths ---`);
          for (let i = 0; i < passes; i++) {
            log('info', `  [${i}] ${mbz_get_pass_source_path(i)}`);
          }
        }

        if (luts > 0) {
          log('info', `\n--- LUT Textures ---`);
          for (let i = 0; i < luts; i++) {
            log('info', `  [${i}] ${mbz_get_lut_id(i)} -> ${mbz_get_lut_path(i)}`);
          }
        }

        if (params > 0) {
          log('info', `\n--- Parameters (first 10) ---`);
          for (let i = 0; i < Math.min(params, 10); i++) {
            log('info', `  [${i}] ${mbz_get_parameter_id(i)} = ${mbz_get_parameter_value(i)}`);
          }
          if (params > 10) log('info', `  ... and ${params - 10} more`);
        }

        // Validation
        const expected = { passes: 10, luts: 7 };
        if (passes === expected.passes && luts === expected.luts) {
          log('ok', `\n[PASS] All assertions passed (${passes} passes, ${luts} LUTs)`);
        } else {
          log('err', `\n[FAIL] Expected ${expected.passes} passes and ${expected.luts} LUTs, got ${passes}/${luts}`);
        }

      } catch (e) {
        log('err', `[ERROR] ${e.message}\n${e.stack}`);
      }
    })();
  </script>
</body>
</html>
