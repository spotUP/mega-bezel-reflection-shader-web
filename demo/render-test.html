<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Mega Bezel WASM</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500&display=swap" rel="stylesheet">
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body { font-family: 'Inter', system-ui, sans-serif; background: #0a0a0a; color: #ccc; }
    #app { display: flex; flex-direction: column; align-items: center; min-height: 100vh; padding: 24px; }
    h1 { font-weight: 500; font-size: 16px; color: #888; margin-bottom: 16px; letter-spacing: -0.01em; }

    #canvas-wrap { position: relative; }
    canvas { display: block; background: #000; }

    /* Loading overlay */
    #overlay {
      position: absolute; inset: 0;
      display: flex; flex-direction: column;
      align-items: center; justify-content: center;
      background: rgba(0,0,0,0.92);
      transition: opacity 0.5s ease;
      z-index: 10;
    }
    #overlay.hidden { opacity: 0; pointer-events: none; }
    #overlay-status { font-size: 13px; font-weight: 500; margin-bottom: 14px; color: #777; }
    #overlay-detail { font-size: 11px; color: #333; margin-top: 10px; max-width: 70%; text-align: center; overflow: hidden; white-space: nowrap; text-overflow: ellipsis; }
    #bar-track { width: 240px; height: 2px; background: #1a1a1a; }
    #bar-fill { height: 100%; width: 0%; background: #555; transition: width 0.15s ease; }

    /* FPS counter */
    #fps {
      position: absolute; top: 8px; right: 10px;
      font-size: 11px; font-weight: 500; color: #555;
      z-index: 5; pointer-events: none;
      font-variant-numeric: tabular-nums;
    }

    /* Controls */
    #controls {
      display: flex; gap: 20px; margin-top: 16px;
      font-size: 12px; color: #555;
    }
    #controls label { display: flex; align-items: center; gap: 6px; }
    #controls select, #controls input[type="range"] { accent-color: #555; }
    #controls select {
      background: #151515; color: #999; border: 1px solid #222;
      padding: 3px 6px; font-family: inherit; font-size: 11px;
      border-radius: 2px;
    }
    #controls input[type="range"] { width: 100px; }
    #controls .val { color: #666; min-width: 28px; text-align: right; font-variant-numeric: tabular-nums; }

    /* Log */
    #log {
      margin-top: 16px; padding: 12px; width: 800px;
      background: #0d0d0d; border: 1px solid #181818;
      white-space: pre-wrap; max-height: 200px; overflow-y: auto;
      font-family: 'SF Mono', 'Cascadia Code', 'Consolas', monospace;
      font-size: 10px; line-height: 1.5; color: #444;
    }
    .ok { color: #6a6; } .err { color: #a55; } .info { color: #666; }
  </style>
</head>
<body>
<div id="app">
  <h1>Mega Bezel Reflection Shader</h1>
  <div id="canvas-wrap">
    <canvas id="output" width="800" height="600"></canvas>
    <div id="fps"></div>
    <div id="overlay">
      <div id="overlay-status">Initializing...</div>
      <div id="bar-track"><div id="bar-fill"></div></div>
      <div id="overlay-detail"></div>
    </div>
  </div>
  <div id="controls">
    <label>Preset
      <select id="ctl-preset">
        <option value="MBZ__3__STD__GDV-local">Full 36-pass</option>
        <option value="crt-with-frame">CRT + frame (3)</option>
        <option value="crt-simple">CRT simple (2)</option>
        <option value="ultra-simple-bezel">Bezel only (1)</option>
      </select>
    </label>
    <label>Pass
      <select id="ctl-pass">
        <option value="0">Final</option>
        <option value="1">Reflection</option>
        <option value="2">Tube</option>
        <option value="3">CRT</option>
        <option value="4">Interlace</option>
        <option value="5">Color</option>
        <option value="6">Dedither</option>
        <option value="7">Drez</option>
        <option value="8">Core</option>
      </select>
    </label>
  </div>
  <div id="log"></div>
</div>

<script src="../dist/wasm/mega-bezel.js"></script>
<script>
const SHADER_ROOT = '../public/shaders';
const SHADER_BASE = SHADER_ROOT + '/mega-bezel';

const logEl = document.getElementById('log');
const log = (cls, msg) => { logEl.innerHTML += `<span class="${cls}">${msg}</span>\n`; logEl.scrollTop = logEl.scrollHeight; };

const overlayEl = document.getElementById('overlay');
const statusEl  = document.getElementById('overlay-status');
const detailEl  = document.getElementById('overlay-detail');
const barFillEl = document.getElementById('bar-fill');
const fpsEl     = document.getElementById('fps');

function progress(pct, status, detail) {
  barFillEl.style.width = Math.min(100, Math.max(0, pct)) + '%';
  if (status) statusEl.textContent = status;
  if (detail !== undefined) detailEl.textContent = detail;
}
function showOverlay() { overlayEl.classList.remove('hidden'); }
function hideOverlay() { overlayEl.classList.add('hidden'); }

// --- FPS ---
let frameCount = 0, lastFpsTime = performance.now();
function updateFps() {
  frameCount++;
  const now = performance.now();
  if (now - lastFpsTime >= 1000) {
    fpsEl.textContent = frameCount + ' fps';
    frameCount = 0;
    lastFpsTime = now;
  }
}

// --- Asset loading helpers ---
async function fetchText(url) {
  const r = await fetch(url + '?t=' + Date.now());
  if (!r.ok) throw new Error(`fetch ${url}: ${r.status}`);
  return r.text();
}

function mkdirp(FS, path) {
  const parts = path.split('/').filter(Boolean);
  let cur = '';
  for (const p of parts) { cur += '/' + p; try { FS.mkdir(cur); } catch(e) {} }
}

async function resolveIncludes(Module, shaderText, shaderDir, loaded = new Set()) {
  const re = /^\s*#include\s+"([^"]+)"/gm;
  let m;
  while ((m = re.exec(shaderText)) !== null) {
    const parts = (shaderDir + '/' + m[1]).split('/');
    const resolved = [];
    for (const p of parts) {
      if (p === '..') { if (resolved.length) resolved.pop(); }
      else if (p !== '.' && p !== '') resolved.push(p);
    }
    const inc = resolved.join('/');
    if (loaded.has(inc)) continue;
    loaded.add(inc);

    const url = inc.startsWith('shaders/') ? `${SHADER_BASE}/${inc}` : `../public/${inc}`;
    let text;
    try { text = await fetchText(url); } catch(e) { continue; }

    const mp = inc.startsWith('shaders/') ? `/preset/${inc}` : `/${inc}`;
    mkdirp(Module.FS, mp.substring(0, mp.lastIndexOf('/')));
    Module.FS.writeFile(mp, text);
    await resolveIncludes(Module, text, inc.substring(0, inc.lastIndexOf('/')), loaded);
  }
}

async function decodeImageToRaw(url) {
  const img = new Image();
  img.crossOrigin = 'anonymous';
  await new Promise((ok, err) => { img.onload = ok; img.onerror = err; img.src = url + '?t=' + Date.now(); });
  const c = document.createElement('canvas');
  c.width = img.width; c.height = img.height;
  const ctx = c.getContext('2d');
  ctx.drawImage(img, 0, 0);
  const rgba = ctx.getImageData(0, 0, img.width, img.height).data;
  const hdr = new Uint32Array([img.width, img.height]);
  const raw = new Uint8Array(8 + rgba.length);
  raw.set(new Uint8Array(hdr.buffer), 0);
  raw.set(rgba, 8);
  return raw;
}

function resolveUrl(base, rel) {
  const parts = (base + '/' + rel).split('/');
  const r = [];
  for (const p of parts) { if (p === '..') r.pop(); else if (p !== '.' && p !== '') r.push(p); }
  return r.join('/');
}

async function loadPreset(Module, presetName) {
  const presetText = await fetchText(`${SHADER_BASE}/${presetName}.slangp`);

  const shaderPaths = [];
  for (const line of presetText.split('\n')) {
    const m = line.match(/^shader(\d+)\s*=\s*(.+)/);
    if (m) shaderPaths.push(m[2].trim());
  }

  const texturePaths = {};
  for (const line of presetText.split('\n')) {
    const pm = line.match(/^(\w+)\s*=\s*(.+\.(png|jpg|bmp))\s*$/i);
    if (pm) {
      let tp = pm[2].trim();
      if (tp.startsWith('../') || tp.startsWith('./')) {
        const pts = tp.split('/'), res = [];
        for (const p of pts) { if (p === '..') res.pop(); else if (p !== '.') res.push(p); }
        tp = res.join('/');
      }
      texturePaths[pm[1]] = tp;
    }
  }

  const total = shaderPaths.length + Object.keys(texturePaths).length + 1;
  let step = 0;

  progress(0, 'Loading shaders...', `0 / ${shaderPaths.length}`);
  const loadedInc = new Set();
  for (const sp of shaderPaths) {
    const rp = resolveUrl('', sp);
    const url = sp.startsWith('../') ? `${SHADER_ROOT}/${rp}` : `${SHADER_BASE}/${rp}`;
    const text = await fetchText(url);
    const mp = `/preset/${rp}`;
    mkdirp(Module.FS, mp.substring(0, mp.lastIndexOf('/')));
    Module.FS.writeFile(mp, text);
    await resolveIncludes(Module, text, sp.substring(0, sp.lastIndexOf('/')), loadedInc);
    step++;
    progress((step / total) * 80, 'Loading shaders...', `${step} / ${shaderPaths.length}: ${rp.split('/').pop()}`);
    await new Promise(r => setTimeout(r, 0));
  }

  const texEntries = Object.entries(texturePaths);
  const uniq = [...new Set(texEntries.map(e => e[1]))];
  progress((step / total) * 80, 'Decoding textures...', `0 / ${uniq.length}`);
  for (let i = 0; i < uniq.length; i++) {
    const path = uniq[i];
    const raw = await decodeImageToRaw(`${SHADER_BASE}/${path}`);
    const mp = `/preset/${path}`;
    mkdirp(Module.FS, mp.substring(0, mp.lastIndexOf('/')));
    Module.FS.writeFile(mp + '.raw', raw);
    step++;
    const w = new DataView(raw.buffer).getUint32(0, true);
    const h = new DataView(raw.buffer).getUint32(4, true);
    progress(((shaderPaths.length + i + 1) / total) * 80, 'Decoding textures...', `${i+1} / ${uniq.length}: ${path.split('/').pop()} (${w}x${h})`);
    await new Promise(r => setTimeout(r, 0));
  }

  let mp = presetText.replace(/^(shader\d+\s*=\s*)(.+)$/gm, (_, pfx, p) => `${pfx}/preset/${resolveUrl('', p.trim())}`);
  for (const [id, path] of texEntries) {
    mp = mp.replace(new RegExp(`^(${id}\\s*=\\s*)(.+)$`, 'gm'), `${id} = /preset/${path}`);
  }
  Module.FS.writeFile('/preset/current.slangp', mp);
  return '/preset/current.slangp';
}

// --- Main ---
let Module, mbz, heapPtr, inputPixels, running = false;

const api = {};
function bindApi() {
  api.initGL        = Module.cwrap('mbz_renderer_init_gl', 'number', ['string']);
  api.init          = Module.cwrap('mbz_init', 'number', []);
  api.create        = Module.cwrap('mbz_renderer_create', 'number', ['string']);
  api.upload        = Module.cwrap('mbz_renderer_upload_frame', 'number', ['number', 'number', 'number']);
  api.render        = Module.cwrap('mbz_renderer_render', 'void', ['number', 'number']);
  api.destroy       = Module.cwrap('mbz_renderer_destroy', 'void', []);
  api.getHeap       = Module.cwrap('mbz_renderer_get_heap_ptr', 'number', ['number']);
}

function createTestPattern() {
  const w = 256, h = 224;
  const px = new Uint8Array(w * h * 4);
  const bars = [[255,255,255],[255,255,0],[0,255,255],[0,255,0],[255,0,255],[255,0,0],[0,0,255]];
  const bw = Math.floor(w / bars.length);
  for (let y = 0; y < h; y++) {
    for (let x = 0; x < w; x++) {
      const i = (y * w + x) * 4;
      if (y < h / 2) {
        const bar = bars[Math.min(Math.floor(x / bw), bars.length - 1)];
        px[i] = bar[0]; px[i+1] = bar[1]; px[i+2] = bar[2];
      } else {
        const on = ((Math.floor(x / 16) + Math.floor(y / 16)) % 2) === 0;
        const v = on ? 26 : 230;
        px[i] = v; px[i+1] = v; px[i+2] = v;
      }
      px[i+3] = 255;
    }
  }
  return { pixels: px, w, h };
}

async function loadAndStart(presetName) {
  const canvas = document.getElementById('output');
  running = false;
  showOverlay();

  if (!Module) {
    progress(0, 'Loading WASM module...');
    Module = await MegaBezelModule({
      canvas,
      locateFile: (p) => p.endsWith('.wasm') ? '../dist/wasm/mega-bezel.wasm' : p
    });
    bindApi();
    api.initGL('#output');
    api.init();
    progress(8, 'GL ready');
    log('ok', 'WASM + GL initialized');
  } else {
    api.destroy();
    progress(8, 'Switching preset...');
  }

  const path = await loadPreset(Module, presetName);

  progress(82, `Compiling shader pipeline...`);
  await new Promise(r => setTimeout(r, 0));
  const ok = api.create(path);
  if (!ok) {
    progress(82, 'Compilation failed', 'Check console');
    log('err', 'Renderer creation failed');
    return;
  }
  log('ok', `Pipeline compiled: ${presetName}`);

  if (!inputPixels) {
    const tp = createTestPattern();
    inputPixels = tp.pixels;
    heapPtr = api.getHeap(inputPixels.byteLength);
    Module.HEAPU8.set(inputPixels, heapPtr);
    api.upload(heapPtr, tp.w, tp.h);
  }

  progress(100, 'Rendering...');
  await new Promise(r => setTimeout(r, 150));
  hideOverlay();

  running = true;
  function loop() {
    if (!running) return;
    api.render(canvas.width, canvas.height);
    updateFps();
    requestAnimationFrame(loop);
  }
  requestAnimationFrame(loop);
}

// --- Controls ---
document.getElementById('ctl-preset').addEventListener('change', (e) => {
  log('info', `Switching to ${e.target.value}...`);
  loadAndStart(e.target.value);
});

document.getElementById('ctl-pass').addEventListener('change', (e) => {
  // HSM_SHOW_PASS_INDEX is read from the preset parameters at render time.
  // For now we log it -- runtime parameter injection needs a bridge function.
  log('info', `Pass view: ${e.target.selectedOptions[0].text} (requires runtime parameter support)`);
});

// --- Boot ---
loadAndStart(document.getElementById('ctl-preset').value);
</script>
</body>
</html>
