<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>mega-bezel-wasm: shader compile test</title>
  <style>
    body { font-family: monospace; background: #1a1a2e; color: #e0e0e0; padding: 2rem; }
    #status { padding: 1rem; background: #16213e; border-radius: 4px; margin-top: 1rem; white-space: pre-wrap; max-height: 80vh; overflow-y: auto; }
    .ok { color: #0f0; }
    .err { color: #f44; }
    .info { color: #4af; }
    .glsl { color: #fa0; }
  </style>
</head>
<body>
  <h1>mega-bezel-wasm: shader compiler test</h1>
  <div id="status">Loading...</div>
  <script src="../dist/wasm/mega-bezel.js"></script>
  <script>
    const SLANG_SOURCE = `#version 450

#pragma name TestShader
#pragma parameter BRIGHTNESS "Brightness" 1.0 0.0 2.0 0.01

layout(push_constant) uniform Push {
    float BRIGHTNESS;
} params;

layout(set = 0, binding = 0) uniform sampler2D Source;

#pragma stage vertex
layout(location = 0) in vec4 Position;
layout(location = 1) in vec2 TexCoord;
layout(location = 0) out vec2 vTexCoord;

void main() {
    gl_Position = Position;
    vTexCoord = TexCoord;
}

#pragma stage fragment
layout(location = 0) in vec2 vTexCoord;
layout(location = 0) out vec4 FragColor;

void main() {
    vec4 color = texture(Source, vTexCoord);
    FragColor = vec4(color.rgb * params.BRIGHTNESS, color.a);
}
`;

    (async function () {
      const el = document.getElementById('status');
      const log = (cls, msg) => { el.innerHTML += `<span class="${cls}">${msg}</span>\n`; };
      el.innerHTML = '';

      try {
        const Module = await MegaBezelModule();
        log('ok', '[OK] WASM module loaded');

        const mbz_compile_shader = Module.cwrap('mbz_compile_shader', 'number', ['string', 'number']);
        const mbz_get_compiled_vertex = Module.cwrap('mbz_get_compiled_vertex', 'string', []);
        const mbz_get_compiled_fragment = Module.cwrap('mbz_get_compiled_fragment', 'string', []);
        const mbz_get_compile_error = Module.cwrap('mbz_get_compile_error', 'string', []);
        const mbz_get_compiled_vertex_len = Module.cwrap('mbz_get_compiled_vertex_len', 'number', []);
        const mbz_get_compiled_fragment_len = Module.cwrap('mbz_get_compiled_fragment_len', 'number', []);

        Module.FS.writeFile('/test.slang', SLANG_SOURCE);
        log('info', '[INFO] Wrote test.slang to MEMFS');

        const result = mbz_compile_shader('/test.slang', 300);
        if (result) {
          log('ok', `[OK] Shader compiled successfully`);

          const vsLen = mbz_get_compiled_vertex_len();
          const fsLen = mbz_get_compiled_fragment_len();
          log('info', `[INFO] Vertex GLSL: ${vsLen} bytes, Fragment GLSL: ${fsLen} bytes`);

          const vs = mbz_get_compiled_vertex();
          const fs = mbz_get_compiled_fragment();

          log('info', '\n--- Vertex Shader (GLSL ES 300) ---');
          log('glsl', vs);

          log('info', '\n--- Fragment Shader (GLSL ES 300) ---');
          log('glsl', fs);

          // Validate
          const hasMain = vs.includes('void main()') && fs.includes('void main()');
          const hasVersion = vs.includes('#version') && fs.includes('#version');
          const hasBrightness = fs.includes('BRIGHTNESS') || fs.includes('Push');

          if (hasMain && hasVersion && hasBrightness) {
            log('ok', '\n[PASS] Compiled GLSL looks valid');
          } else {
            log('err', `\n[FAIL] GLSL validation: main=${hasMain} version=${hasVersion} brightness=${hasBrightness}`);
          }
        } else {
          const err = mbz_get_compile_error();
          log('err', `[ERROR] Compilation failed: ${err}`);
        }

      } catch (e) {
        log('err', `[ERROR] ${e.message}\n${e.stack}`);
      }
    })();
  </script>
</body>
</html>
